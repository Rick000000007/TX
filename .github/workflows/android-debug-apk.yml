name: Android Debug APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        arch: [arm64-v8a]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager "ndk;25.2.9519653"
          sdkmanager "cmake;3.22.1"
          sdkmanager "build-tools;34.0.0"
          sdkmanager "platforms;android-34"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Fix Gradle Wrapper
        working-directory: ./android
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Decode signing key
        run: echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > /tmp/tx-debug-key.jks

      - name: Build Release APK
        working-directory: ./android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
          SIGNING_STORE_FILE: /tmp/tx-debug-key.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace \
            -Pandroid.injected.build.abi=${{ matrix.arch }}

      - name: List APK files
        run: |
          echo "=== outputs/apk/release ==="
          find android/app/build/outputs/apk/release -maxdepth 2 -type f 2>/dev/null | sort || true
          echo "=== outputs/apk/debug ==="
          find android/app/build/outputs/apk/debug -maxdepth 2 -type f 2>/dev/null | sort || true

      - name: Verify APK
        run: |
          ls -l android/app/build/outputs/apk/debug/ || true
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner verify --verbose --print-certs android/app/build/outputs/apk/debug/app-debug.apk

      - name: Verify APK
        run: |
          echo "=== APK FILES ==="
          ls -l android/app/build/outputs/apk/debug/ || true
          echo "=== APKSIGNER VERIFY ==="
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner verify --verbose --print-certs android/app/build/outputs/apk/debug/app-debug.apk || true
          echo "=== ZIP CONTENTS ==="
          unzip -l android/app/build/outputs/apk/debug/app-debug.apk | head -80 || true

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tx-debug-${{ matrix.arch }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload Build Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.arch }}
          path: |
            android/app/build/outputs/logs/
            android/app/.cxx/
            android/app/build/intermediates/cxx/
          retention-days: 3
